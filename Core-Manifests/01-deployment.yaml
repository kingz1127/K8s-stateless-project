apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment-readiness
  labels:
    app: nginx
    environment: test
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
      environment: test
  template:
    metadata:
      labels:
        app: nginx
        environment: test
    spec:
      containers:
      - name: nginx
        image: nginx:1.25.4
        ports:
        - containerPort: 80
        command:
        - /bin/sh
        - -c
        - |
          echo "Served by Pod with IP address: $(hostname -i)" > /usr/share/nginx/html/index.html
          nginx -g "daemon off;"
        readinessProbe:
          httpGet:
            path: /ready
            port: 80
          initialDelaySeconds: 5
          timeoutSeconds: 10
          periodSeconds: 2
          successThreshold: 1
          failureThreshold: 2
